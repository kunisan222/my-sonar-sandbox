name: SonarCloud Analysis
on:
  push:
    branches: [ main, smple1 ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ビルドツールの準備
      - name: Install Build Wrapper
        run: |
          wget -q https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -q build-wrapper-linux-x86.zip

      # コンパイル実行（bw-output フォルダに記録を残す）
      - name: Run Build Wrapper
        run: |
          ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 --out-dir bw-output g++ -std=c++17 main.cpp -o my_app

      # ★ここを修正しました★
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kunisan222_my-sonar-sandbox
            -Dsonar.organization=kunisan222
            -Dsonar.sources=.
            -Dsonar.cfamily.build-wrapper-output=bw-output
            -Dsonar.host.url=https://sonarcloud.io
